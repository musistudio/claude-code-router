[package]
name = "ccr-proxy"
version = "2.0.0"
description = "CCR Proxy - Claude Code Router Desktop"
authors = ["CCR Team"]
license = "MIT"
repository = "https://github.com/joker2305/proxy_local"
edition = "2021"
rust-version = "1.77.2"

[lib]
name = "app_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2.6.2", features = [] }

[dependencies]
serde_json = "1.0"
serde = { version = "1.0", features = ["derive"] }
log = "0.4"
tauri = { version = "2.11.2", features = ["tray-icon"] }
tauri-plugin-log = "2"
tauri-plugin-shell = "2"
