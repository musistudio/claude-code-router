<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' http://127.0.0.1:* http://localhost:* ws://127.0.0.1:* ws://localhost:*; object-src 'none'; base-uri 'self'; form-action 'none'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codex Spotlight</title>
    <style>
      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: transparent !important;
        background-color: transparent !important;
      }
    </style>
  </head>
  <body style="background: transparent; background-color: transparent">
    <div id="root"></div>
    <script>
      (() => {
        try {
          const rawPreferences = window.localStorage.getItem("agent-console:settings-preferences");
          const preference = JSON.parse(rawPreferences || "{}")?.theme;
          const themePreference = preference === "light" || preference === "dark" || preference === "system" ? preference : "system";
          const resolvedTheme =
            themePreference === "system"
              ? window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light"
              : themePreference;
          document.documentElement.dataset.theme = resolvedTheme;
          document.documentElement.dataset.themePreference = themePreference;
          document.documentElement.classList.toggle("dark", resolvedTheme === "dark");
          document.documentElement.style.colorScheme = resolvedTheme;
        } catch {
          document.documentElement.dataset.theme = "light";
          document.documentElement.dataset.themePreference = "system";
        }
      })();
    </script>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
